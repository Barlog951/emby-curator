# SonarQube Project Configuration
# Emby Dedupe - Media Deduplication Tool

# Required: Unique project identifier
sonar.projectKey=emby-dedupe

# Project metadata
sonar.projectName=Emby Dedupe
sonar.projectVersion=1.0

# Source configuration
sonar.sources=emby_dedupe
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Python-specific settings
sonar.python.version=3.12

# Test coverage
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# Exclusions (exclude these from all analysis)
sonar.exclusions=**/venv/**,**/__pycache__/**,**/*.pyc,**/static/**,**/templates/**

# Server configuration
sonar.host.url=http://sonarqube.sonarcube.orb.local
# sonar.token is provided via the SONAR_TOKEN env var (see .sonar-token, gitignored)

# Analysis scope
sonar.scm.provider=git

# New code definition
sonar.leak.period=30
