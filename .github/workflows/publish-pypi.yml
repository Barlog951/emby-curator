name: Publish to PyPI

# Auto-publish the package to PyPI whenever a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token/secret stored in the repo.
# One-time setup on PyPI: project emby-curator -> Publishing -> add a GitHub
# publisher (owner: Barlog951, repo: emby-curator, workflow: publish-pypi.yml).

on:
  release:
    types: [released]
  workflow_dispatch:

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
